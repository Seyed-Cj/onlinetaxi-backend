services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: onlinetaxi-postgres
    environment:
      POSTGRES_USER: onlinetaxi
      POSTGRES_PASSWORD: TAXI1234
      POSTGRES_DB: taxidb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: onlinetaxi-redis
    ports:
      - '6379:6379'
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: onlinetaxi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'
      - '15672:15672'
    restart: always
  
  minio:
    image: minio/minio
    container_name: onlinetaxi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    restart: always

volumes:
  pgdata:
